    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f3e 50%, #0f1525 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Partículas de fundo */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.4), transparent);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        .particle:nth-child(1) { width: 200px; height: 200px; top: 10%; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 150px; height: 150px; top: 60%; left: 80%; animation-delay: -5s; }
        .particle:nth-child(3) { width: 180px; height: 180px; top: 80%; left: 20%; animation-delay: -10s; }
        .particle:nth-child(4) { width: 120px; height: 120px; top: 20%; left: 70%; animation-delay: -3s; }
        .particle:nth-child(5) { width: 250px; height: 250px; top: 50%; left: 50%; animation-delay: -8s; }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            25% {
                transform: translate(100px, -50px) scale(1.2);
                opacity: 0.5;
            }
            50% {
                transform: translate(50px, 50px) scale(0.8);
                opacity: 0.2;
            }
            75% {
                transform: translate(-50px, 30px) scale(1.1);
                opacity: 0.4;
            }
        }

        /* Container principal */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 20px;
            max-width: 800px;
            width: 100%;
        }

        /* Efeito Glow */
        .glow-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.15), transparent 70%);
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes pulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.8;
            }
        }

        /* Badge "Em Breve" */
        .badge {
            display: inline-block;
            background: rgba(79, 172, 254, 0.15);
            border: 1px solid rgba(79, 172, 254, 0.3);
            border-radius: 50px;
            padding: 8px 24px;
            margin-bottom: 30px;
            animation: slideIn 0.8s ease-out;
        }

        .badge span {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .badge i {
            color: #4facfe;
            margin-right: 8px;
            font-size: 0.8rem;
        }

        /* Título principal */
        .main-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
            animation: slideIn 0.8s ease-out 0.2s both;
        }

        .main-title .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #4facfe 50%, #00f2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Subtítulo */
        .subtitle {
            font-size: 1.2rem;
            color: #8e9eae;
            margin-bottom: 40px;
            line-height: 1.6;
            animation: slideIn 0.8s ease-out 0.4s both;
        }

        .subtitle strong {
            color: #4facfe;
            font-weight: 600;
        }

        /* Timer / Contador */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            animation: slideIn 0.8s ease-out 0.6s both;
        }

        .countdown-item {
            background: rgba(15, 25, 45, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(79, 172, 254, 0.2);
            border-radius: 20px;
            padding: 20px 25px;
            min-width: 100px;
            transition: all 0.3s;
        }

        .countdown-item:hover {
            transform: translateY(-5px);
            border-color: rgba(79, 172, 254, 0.5);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.2);
        }

        .countdown-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .countdown-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8e9eae;
            margin-top: 8px;
        }

        /* Formulário de notificação */
        .notify-form {
            display: flex;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto 30px;
            animation: slideIn 0.8s ease-out 0.8s both;
        }

        .notify-input {
            flex: 1;
            padding: 14px 20px;
            background: rgba(15, 25, 45, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(79, 172, 254, 0.2);
            border-radius: 50px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .notify-input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.2);
        }

        .notify-input::placeholder {
            color: #5a6a7e;
        }

        .notify-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .notify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.3);
        }

        .notify-btn:active {
            transform: translateY(0);
        }

        /* Ícones sociais */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            animation: slideIn 0.8s ease-out 1s both;
        }

        .social-link {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(15, 25, 45, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8e9eae;
            font-size: 1.1rem;
            transition: all 0.3s;
            text-decoration: none;
        }

        .social-link:hover {
            color: #4facfe;
            border-color: #4facfe;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.2);
        }

        /* Mensagem de sucesso */
        .success-message {
            display: none;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 50px;
            padding: 12px 24px;
            color: #00ff88;
            font-weight: 600;
            margin-top: 20px;
            animation: slideIn 0.5s ease-out;
        }

        .success-message i {
            margin-right: 8px;
        }

        /* Link de voltar */
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #5a6a7e;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
            animation: slideIn 0.8s ease-out 1.2s both;
        }

        .back-link:hover {
            color: #4facfe;
        }

        .back-link i {
            margin-right: 8px;
        }

        /* Animações */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .countdown-container {
                gap: 10px;
            }

            .countdown-item {
                padding: 15px 18px;
                min-width: 80px;
            }

            .countdown-number {
                font-size: 2rem;
            }

            .notify-form {
                flex-direction: column;
                padding: 0 20px;
            }

            .notify-btn {
                width: 100%;
            }

            .glow-circle {
                width: 300px;
                height: 300px;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 2rem;
            }

            .countdown-item {
                padding: 12px 14px;
                min-width: 70px;
            }

            .countdown-number {
                font-size: 1.6rem;
            }

            .countdown-label {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de fundo -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Container principal -->
    <div class="container">
        <!-- Efeito Glow -->
        <div class="glow-circle"></div>

        <!-- Badge >
        <div class="badge">
            <i class="fas fa-rocket"></i>
            <span>Em Breve</span>
        </div-->

        <!-- Título -->
        <h1 class="main-title">
            <span class="gradient-text">Em Breve</span><br>
            <span style="color: white;">Nova Plataforma</span>
        </h1>

        <!-- Subtítulo -->
        <p class="subtitle">
            Estamos desenvolvendo uma novo <strong>produto</strong> para o monitoramento climático.<br>
            Em breve estará pronto!
        </p>

        <!-- Contador -->
        <div class="countdown-container" id="countdown">
            <div class="countdown-item">
                <div class="countdown-number" id="days">00</div>
                <div class="countdown-label">Dias</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="hours">00</div>
                <div class="countdown-label">Horas</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="minutes">00</div>
                <div class="countdown-label">Minutos</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="seconds">00</div>
                <div class="countdown-label">Segundos</div>
            </div>
        </div>

        <!-- Formulário de notificação -->
        <form class="notify-form" id="notifyForm">
            <input 
                type="email" 
                class="notify-input" 
                placeholder="Digite seu melhor e-mail..." 
                required
                id="emailInput"
            >
            <button type="submit" class="notify-btn">
                <i class="fas fa-bell"></i> Avise-me
            </button>
        </form>

        <!-- Mensagem de sucesso -->
        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i>
            E-mail cadastrado com sucesso! Entraremos em contato em breve.
        </div>

        <!-- Ícones sociais -->
        <div class="social-links">
            <a href="https://www.instagram.com/maranhaosema/" class="social-link" title="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="#" class="social-link" title="Twitter">
                <i class="fab fa-twitter"></i>
            </a>
            <a href="#" class="social-link" title="LinkedIn">
                <i class="fab fa-linkedin-in"></i>
            </a>
            <a href="#" class="social-link" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
        </div>

        <!-- Link de voltar >
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Voltar para o site principal
        </a-->
    </div>

    <script>
        // ========== CONTADOR REGRESSIVO ==========
        // Defina a data de lançamento aqui (ano, mês-1, dia, hora, minuto, segundo)
        const launchDate = new Date('2026-05-20T00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            if (distance < 0) {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        // Atualiza a cada segundo
        updateCountdown();
        setInterval(updateCountdown, 1000);

        // ========== FORMULÁRIO DE NOTIFICAÇÃO ==========
        document.getElementById('notifyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const emailInput = document.getElementById('emailInput');
            const email = emailInput.value;
            
            // Aqui você pode adicionar a lógica para salvar o e-mail
            // Por enquanto, vamos apenas mostrar a mensagem de sucesso
            
            // Salvar no localStorage (simulação)
            const emails = JSON.parse(localStorage.getItem('notifyEmails') || '[]');
            emails.push({
                email: email,
                date: new Date().toISOString()
            });
            localStorage.setItem('notifyEmails', JSON.stringify(emails));
            
            // Mostrar mensagem de sucesso
            const successMessage = document.getElementById('successMessage');
            successMessage.style.display = 'block';
            emailInput.value = '';
            
            // Esconder mensagem após 5 segundos
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 5000);
            
            console.log('E-mails cadastrados:', emails);
        });

        // Animação suave ao carregar
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Página "Em Breve" carregada com sucesso!');
        });
    </script>
</body>
</html>
