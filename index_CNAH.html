<body>
    <div class="cabecario">Cadastro Nacional de Usuários de Recursos Hídricos - <b>CNARH</b></div>

    <iframe class="mapa" src="mapa_CNAH.html" title="Mapa CNARH"></iframe>

    <a href="https://www.sema.ma.gov.br/" target="_blank" title="Secretaria de Estado do Meio Ambiente e Recursos Naturais - SEMA" rel="noopener">
        <img class="imagem_SEMA" src="assets/images/logo/SEMA/2023/IDVISUAL_GOVMA_SEMA.png" alt="Logo da SEMA" />
    </a>

    <div class="toggle-button" id="toggleButton" aria-label="Mostrar/Ocultar Legenda">Legenda</div>

    <div class="mapa-legenda hidden" id="mapaLegenda">
        <div class="legenda">
            <div class="legenda-item">
                <span><b>Classificação</b></span>
            </div>
            <div class="legenda-item">
                <div class="cor-verde"></div>
                <span>Outorga Vigente</span>
            </div>
            <div class="legenda-item">
                <div class="cor-vermelha"></div>
                <span>Outorga Expirada</span>
            </div>
        </div>
    </div>

    <script>
        // Toggle das legendas
        document.getElementById("toggleButton").onclick = function() {
            var mapaLegenda = document.getElementById("mapaLegenda");
            var outraLegenda = document.getElementById("outraLegenda");

            if (mapaLegenda.classList.contains("hidden")) {
                mapaLegenda.classList.remove("hidden");
                mapaLegenda.classList.add("visible");
            } else {
                mapaLegenda.classList.remove("visible");
                mapaLegenda.classList.add("hidden");
            }

            if (outraLegenda) {
                if (outraLegenda.classList.contains("hidden")) {
                    outraLegenda.classList.remove("hidden");
                    outraLegenda.classList.add("visible");
                } else {
                    outraLegenda.classList.remove("visible");
                    outraLegenda.classList.add("hidden");
                }
            }
        };

        // Controle do grupo de imagens com suporte para touch em mobile
        const container = document.getElementById('grupo_container1');
        if (container) {
            // Eventos para desktop (hover)
            container.addEventListener('mouseover', () => {
                const imagens = container.querySelectorAll('.grupo_what_img');
                imagens.forEach(imagem => {
                    imagem.style.opacity = '1';
                });
            });

            container.addEventListener('mouseout', () => {
                const imagens = container.querySelectorAll('.grupo_what_img');
                imagens.forEach(imagem => {
                    imagem.style.opacity = '0';
                });
            });

            // Eventos para mobile (touch)
            container.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const imagens = container.querySelectorAll('.grupo_what_img');
                imagens.forEach(imagem => {
                    imagem.style.opacity = '1';
                });
                // Expande o container no toque
                container.style.right = '0px';
                container.style.height = '360px';
            });

            container.addEventListener('touchend', () => {
                setTimeout(() => {
                    const imagens = container.querySelectorAll('.grupo_what_img');
                    imagens.forEach(imagem => {
                        imagem.style.opacity = '0';
                    });
                    // Retrai o container após o toque
                    container.style.right = '-70px';
                    container.style.height = '150px';
                }, 2000); // Aguarda 2 segundos antes de retrair
            });
        }

        // Modal para imagens ampliadas
        function openImageModal(imageUrl) {
            var modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.backgroundColor = 'rgba(0,0,0,0.7)';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.zIndex = '99999';
            modal.innerHTML = '<img src="' + imageUrl + '" alt="Imagem Ampliada" style="max-width: 80%; max-height: 80%; border-radius: 5px;">';
            
            modal.onclick = function() {
                modal.remove();
            };
            
            document.body.appendChild(modal);
        }

        // Ajuste do iframe para altura total
        function ajustarAlturaIframe() {
            const iframe = document.querySelector('.mapa');
            if (iframe) {
                iframe.style.height = window.innerHeight + 'px';
            }
        }

        window.addEventListener('resize', ajustarAlturaIframe);
        window.addEventListener('load', ajustarAlturaIframe);
    </script>
